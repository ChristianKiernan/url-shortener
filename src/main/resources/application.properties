spring.application.name=url-shortener
spring.docker.compose.enabled=false
spring.datasource.url=jdbc:postgresql://localhost:5433/urlshortener
spring.datasource.username=urlshortener
spring.datasource.password=urlshortener
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=URL Shortener
info.app.version=1.0.0
springdoc.paths-to-exclude=/actuator/**
springdoc.swagger-ui.path=/swagger-ui.html
spring.data.redis.host=localhost
spring.data.redis.port=6379